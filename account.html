<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-box { max-width: 400px; margin: 0 auto; text-align: center; }
        .tab-group { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 2rem; }
        .tab { flex: 1; padding: 1rem; cursor: pointer; color: #888; }
        .tab.active { border-bottom: 2px solid var(--gold); color: var(--black); font-weight: bold; }
        .dashboard { display: none; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <a href="index.html" class="brand">Gift<span>Wallay</span></a>
        <a href="cart.html" class="cart-icon">🛒<span class="cart-count">0</span></a>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-menu" id="sidebarMenu">
        <div style="text-align: right; font-size: 1.5rem; cursor: pointer;" onclick="toggleSidebar()">×</div>
        <div style="margin-top: 2rem;">
            <a href="index.html" class="sidebar-link">Home</a>
            <a href="shop.html" class="sidebar-link">Shop All</a>
            <a href="account.html" class="sidebar-link">My Account</a>
            <a href="admin.html" class="sidebar-link">Admin Portal</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container section-pad">
        
        <!-- STATE 1: LOGIN / REGISTER -->
        <div id="authSection" class="auth-box">
            <h2 style="margin-bottom: 2rem;">Welcome</h2>
            
            <div class="tab-group">
                <div class="tab active" onclick="switchAuth('login', this)">Login</div>
                <div class="tab" onclick="switchAuth('register', this)">Register</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="event.preventDefault(); loginSim();">
                <input type="email" placeholder="Email Address" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd;">
                <input type="password" placeholder="Password" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd;">
                <button class="btn" style="width: 100%;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none;">
                <input type="text" placeholder="Full Name" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd;">
                <input type="email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd;">
                <input type="password" placeholder="Create Password" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd;">
                <button class="btn" style="width: 100%;">Create Account</button>
            </form>
        </div>

        <!-- STATE 2: DASHBOARD (Hidden by default) -->
        <div id="dashboardSection" class="dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h1>My Profile</h1>
                <button class="btn btn-outline" onclick="logoutSim()">Log Out</button>
            </div>

            <div style="background: var(--gray); padding: 2rem; margin-bottom: 2rem;">
                <h3>Ali Khan</h3>
                <p>Lahore, Pakistan</p>
                <p class="text-gold">Gold Member</p>
            </div>

            <h3>Recent Orders</h3>
            <table class="cart-table">
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Total</th>
                </tr>
                <tr>
                    <td>#1092</td>
                    <td>July 14, 2026</td>
                    <td style="color: orange;">Processing</td>
                    <td>Rs. 17,550</td>
                </tr>
            </table>
        </div>

    </div>

    <script src="main.js"></script>
    <script>
        function switchAuth(type, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            if(type === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function loginSim() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
        }

        function logoutSim() {
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }
    </script>
</body>
</html>
