<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Gift Wallay</title>
    <!-- Google Auth Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .account-page-wrapper {
            margin: 4rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            padding: 3.5rem;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 15px 45px rgba(0,0,0,0.04);
            border-top: 4px solid var(--gold);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-nav { 
            display: flex; 
            border-bottom: 1px solid rgba(0,0,0,0.06); 
            margin-bottom: 2.5rem; 
        }
        
        .tab-btn { 
            flex: 1; 
            padding: 1.2rem; 
            text-align: center; 
            cursor: pointer; 
            font-family: var(--font-head); 
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #888; 
            transition: all 0.3s ease;
            font-weight: 700;
        }
        .tab-btn.active { 
            color: var(--black); 
            border-bottom: 2px solid var(--gold); 
        }
        
        .input-group { 
            margin-bottom: 1.8rem; 
            position: relative; 
        }
        
        .input-group label { 
            display: block; 
            font-family: var(--font-body);
            font-size: 0.75rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px; 
            color: #555; 
        }
        
        .input-field { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid rgba(0,0,0,0.10); 
            background: #fdfdfd;
            font-family: var(--font-body); 
            font-size: 0.95rem;
            color: var(--black);
            transition: all 0.3s ease; 
        }
        .input-field:focus { 
            border-color: var(--gold); 
            background: var(--white);
            outline: none; 
            box-shadow: 0 4px 12px rgba(212,175,55,0.08);
        }

        /* Status colors */
        .status-badge {
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--white);
            border-radius: 0;
            display: inline-block;
        }

        /* Google Box and Logout styling */
        .google-auth-box {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .logout-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #cc3333;
            color: white;
            border: none;
            font-family: var(--font-head);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease;
            text-align: center;
            margin-top: 1.5rem;
        }
        .logout-btn:hover {
            background: #b32424;
        }
    </style>
</head>
<body>

    <!-- NAVBAR INJECTED BY MAIN.JS -->
    <nav class="navbar"></nav>

    <!-- SIDEBAR INJECTED BY MAIN.JS -->
    <div class="sidebar" id="sidebar"></div>

    <div class="container account-page-wrapper">
        
        <!-- AUTH CARD -->
        <div class="auth-container">
            <div id="auth-logged-out-view">
                <h2 style="text-align: center; margin-bottom: 0.5rem; font-family: var(--font-head); letter-spacing: 1px;">Welcome Back</h2>
                <p style="text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem;">Sign in to access your premium shopping profile.</p>

                <div class="tab-nav">
                    <div class="tab-btn active">Login</div>
                    <div class="tab-btn">Register</div>
                </div>

                <!-- Forms injected by main.js go here -->

                <!-- Google Sign-In Container -->
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_select="true"
                     data-itp_support="true">
                </div>

                <div class="google-auth-box">
                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="rectangular"
                         data-theme="filled_blue"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left">
                    </div>
                </div>
            </div>

            <!-- Dynamic Dashboard / Logout View Container -->
            <div id="auth-logged-in-view" style="display: none; text-align: center;">
                <h2 style="font-family: var(--font-head); margin-bottom: 0.5rem;" id="welcome-user-title">Hello, User</h2>
                <p style="color: #666; margin-bottom: 2rem; font-size: 0.9rem;">Manage your premium gift orders and profile details.</p>
                
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
