<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-sidebar { width: 250px; background: var(--black); color: white; height: 100vh; position: fixed; left: 0; top: 0; padding: 2rem; }
        .admin-content { margin-left: 250px; padding: 3rem; }
        .stat-card { background: var(--gray); padding: 1.5rem; border-left: 4px solid var(--gold); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        .data-table th, .data-table td { text-align: left; padding: 1rem; border-bottom: 1px solid #eee; }
        .data-table th { background: #f9f9f9; }
        .status { padding: 5px 10px; background: #eee; border-radius: 4px; font-size: 0.8rem; }
        .status.paid { background: #d4edda; color: #155724; }
    </style>
</head>
<body style="padding-top: 0;">

    <div class="admin-sidebar">
        <div class="brand" style="color: white; margin-bottom: 3rem;">GW<span class="text-gold">Admin</span></div>
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            <a href="#" style="color: var(--gold);">Dashboard</a>
            <a href="#">Products</a>
            <a href="#">Orders</a>
            <a href="#">Customers</a>
            <a href="#">Settings</a>
        </div>
    </div>

    <div class="admin-content">
        <h1>Dashboard Overview</h1>
        
        <!-- Stats Grid -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin: 2rem 0;">
            <div class="stat-card">
                <small>Total Revenue</small>
                <h3>$12,450</h3>
            </div>
            <div class="stat-card">
                <small>Orders Today</small>
                <h3>14</h3>
            </div>
            <div class="stat-card">
                <small>Pending Items</small>
                <h3>3</h3>
            </div>
        </div>

        <!-- Recent Orders -->
        <h3>Recent Orders</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#1024</td>
                    <td>Ali Khan</td>
                    <td>July 12, 2026</td>
                    <td>$299.00</td>
                    <td><span class="status paid">Paid</span></td>
                    <td><button class="btn" style="padding: 5px 10px; font-size: 0.7rem;">View</button></td>
                </tr>
                <tr>
                    <td>#1023</td>
                    <td>Sara Ahmed</td>
                    <td>July 11, 2026</td>
                    <td>$89.00</td>
                    <td><span class="status">Processing</span></td>
                    <td><button class="btn" style="padding: 5px 10px; font-size: 0.7rem;">View</button></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
