<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; color: white; }
        .dashboard { display: none; padding: 2rem; }
    </style>
</head>
<body style="padding-top: 0;">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div style="text-align: center; width: 300px;">
            <h2 style="color: var(--gold); margin-bottom: 1rem;">Admin Access</h2>
            <input type="text" id="aUser" placeholder="Username" style="background: #222; border: 1px solid #444; color: white;">
            <input type="password" id="aPass" placeholder="Password" style="background: #222; border: 1px solid #444; color: white;">
            <button class="btn" style="width: 100%; border-color: var(--gold);" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <h1>Welcome, Admin</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
            <!-- Add Product -->
            <div style="background: #f4f4f4; padding: 2rem;">
                <h3>Add Product</h3>
                <input type="text" placeholder="Product Name">
                <input type="number" placeholder="Price (PKR)">
                <input type="text" placeholder="Image URL">
                <button class="btn">Add to Store</button>
            </div>
            <!-- Users Sheet -->
            <div style="background: #f4f4f4; padding: 2rem;">
                <h3>Registered Users</h3>
                <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                    <tr style="background: #ddd;"><th>ID</th><th>Name</th><th>City</th></tr>
                    <tr><td>1</td><td>Ali Khan</td><td>Lahore</td></tr>
                    <tr><td>2</td><td>Zara Sheikh</td><td>Karachi</td></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        function adminLogin() {
            const u = document.getElementById('aUser').value;
            const p = document.getElementById('aPass').value;
            if(u === 'admin' && p === 'gift123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert('Invalid Credentials');
            }
        }
    </script>
</body>
</html>
