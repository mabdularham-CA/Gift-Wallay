<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Wallay | Premium Gifts</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* HERO IMAGE CONFIGURATION */
        .hero-section {
            height: 90vh;
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=1600&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-color: #111; /* Fallback color */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero-title {
            font-size: clamp(3rem, 5vw, 6rem);
            margin-bottom: 1rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeUp 1s ease 0.5s forwards;
            opacity: 0; transform: translateY(20px);
        }

        .hero-btn {
            padding: 15px 40px;
            background: white; color: black;
            border: none;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            animation: fadeUp 1s ease 0.8s forwards;
            opacity: 0; transform: translateY(20px);
        }
        .hero-btn:hover { background: var(--gold); color: white; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <a href="index.html" class="brand" id="brandLogo" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
            <img src="Gift-Wallay.png" alt="Gift-Wallay Logo" style="height: 48px; max-height: 48px; width: auto; object-fit: contain; display: block;">
        </a>
        <a href="cart.html" class="cart-icon">🛒<span class="cart-count">0</span></a>
    </nav>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-menu" id="sidebarMenu">
        <div style="text-align: right; font-size: 1.5rem; cursor: pointer;" onclick="toggleSidebar()">×</div>
        <div style="margin-top: 2rem;">
            <a href="index.html" class="sidebar-link">Home</a>
            <a href="shop.html" class="sidebar-link">Shop All</a>
            <a href="account.html" class="sidebar-link">My Account</a>
        </div>
    </div>

    <!-- HERO SECTION -->
    <section class="hero-section">
        <h1 class="hero-title">The Art of Giving</h1>
        <p style="font-size: 1.2rem; margin-bottom: 2rem; font-weight: 300; letter-spacing: 1px;">PREMIUM • TIMELESS • ELEGANT</p>
        <a href="shop.html"><button class="hero-btn">Explore Collection</button></a>
    </section>

    <!-- ENDLESS CATEGORIES (7 Items) -->
    <section style="padding: 4rem 0; overflow: hidden;">
        <h2 class="text-center" style="margin-bottom: 3rem;">Our Collections</h2>
        
        <div class="scroll-wrapper" style="user-select: none;">
            <!-- We duplicate the list to create a seamless loop -->
            <div class="scroll-track">
                <!-- SET 1 -->
                <a href="category.html?type=Watches" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&auto=format&fit=crop&q=80');"><span>Watches</span></a>
                <a href="category.html?type=Perfumes" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1541643600914-78b084683601?w=600&auto=format&fit=crop&q=80');"><span>Perfumes</span></a>
                <a href="category.html?type=Wallets" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1627123424574-724758594e93?w=600&auto=format&fit=crop&q=80');"><span>Wallets</span></a>
                <a href="category.html?type=Jewelry" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=600&auto=format&fit=crop&q=80');"><span>Jewelry</span></a>
                <a href="category.html?type=Glasses" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600&auto=format&fit=crop&q=80');"><span>Sun Glasses</span></a>
                <a href="category.html?type=Customized" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=600&auto=format&fit=crop&q=80');"><span>Customized</span></a>
                <a href="category.html?type=Hampers" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?w=600&auto=format&fit=crop&q=80');"><span>Gift Hampers</span></a>

                <!-- SET 2 (Duplicate for Loop) -->
                <a href="category.html?type=Watches" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&auto=format&fit=crop&q=80');"><span>Watches</span></a>
                <a href="category.html?type=Perfumes" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1541643600914-78b084683601?w=600&auto=format&fit=crop&q=80');"><span>Perfumes</span></a>
                <a href="category.html?type=Wallets" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1627123424574-724758594e93?w=600&auto=format&fit=crop&q=80');"><span>Wallets</span></a>
                <a href="category.html?type=Jewelry" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=600&auto=format&fit=crop&q=80');"><span>Jewelry</span></a>
                <a href="category.html?type=Glasses" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600&auto=format&fit=crop&q=80');"><span>Sun Glasses</span></a>
                <a href="category.html?type=Customized" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=600&auto=format&fit=crop&q=80');"><span>Customized</span></a>
                <a href="category.html?type=Hampers" class="cat-item" style="background-image: url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?w=600&auto=format&fit=crop&q=80');"><span>Gift Hampers</span></a>
            </div>
        </div>
    </section>

    <!-- RECENTLY ADDED -->
    <section class="container section-pad">
        <h2 style="margin-bottom: 2rem;">Recently Added</h2>
        <div class="product-grid">
            <!-- Dynamically populated from store database -->
        </div>
    </section>

    <script src="main.js"></script>
    <script>
        // Check for Login Success Parameter
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('login') === 'success') {
                // Premium SweetAlert style (Standard JS Alert for now)
                setTimeout(() => {
                    alert("✓ Login Successful! Welcome back to Gift Wallay.");
                }, 500);
            }
        });
    </script>
</body>
</html>
