<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 4rem; }
        @media(max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
        .summary { background: var(--gray); padding: 2rem; height: fit-content; }
    </style>
</head>
<body>

    <nav><a href="index.html" class="brand">Gift<span class="text-gold">Wallay</span></a></nav>

    <div class="container section-pad">
        <h1 class="text-center" style="margin-bottom: 3rem;">Secure Checkout</h1>

        <div class="checkout-grid">
            <!-- FORM -->
            <form>
                <h3 style="margin-bottom: 1.5rem;">Shipping Details</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="text" placeholder="First Name">
                    <input type="text" placeholder="Last Name">
                </div>
                <input type="text" placeholder="Phone (e.g. 0300-1234567)">
                <input type="text" placeholder="Street Address / House No.">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <select>
                        <option>Punjab</option>
                        <option>Sindh</option>
                        <option>KPK</option>
                        <option>Balochistan</option>
                    </select>
                    <input type="text" placeholder="City">
                </div>

                <h3 style="margin: 2rem 0 1rem;">Payment</h3>
                <label style="display: block; padding: 1rem; border: 1px solid var(--gold); background: #fffaf0; margin-bottom: 1rem;">
                    <input type="radio" checked> <strong>Cash on Delivery (COD)</strong>
                    <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">Pay with cash upon delivery.</p>
                </label>
                <label style="display: block; padding: 1rem; border: 1px solid #ddd;">
                    <input type="radio" disabled> Credit / Debit Card (Coming Soon)
                </label>
            </form>

            <!-- SUMMARY -->
            <div class="summary">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Royal Emerald Watch x1</span>
                    <span>Rs. 12,500</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Delivery Charges</span>
                    <span>Rs. 250</span>
                </div>
                <div style="border-top: 1px solid #ccc; margin: 1rem 0;"></div>
                <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700;">
                    <span>Total</span>
                    <span class="text-gold">Rs. 12,750</span>
                </div>
                <button class="btn" style="width: 100%; background: var(--black); color: var(--gold); margin-top: 2rem;">Complete Order</button>
            </div>
        </div>
    </div>

</body>
</html>
