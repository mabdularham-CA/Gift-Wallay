<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 4rem; }
        @media(max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
        
        /* Custom Payment Option */
        .pay-option {
            border: 1px solid #ddd; padding: 1.5rem; margin-bottom: 1rem;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .pay-option:hover, .pay-option.selected { border-color: var(--gold); background: #fffcf5; }
        
        /* Radio Button on Right */
        .pay-option input { width: auto; margin: 0; }
        
        /* Thumbnail */
        .summ-thumb { width: 50px; height: 50px; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- NAV: BACK ARROW ONLY -->
    <nav class="navbar">
        <a href="cart.html" style="font-size: 1.5rem; cursor: pointer;">←</a>
        <a href="index.html" class="brand">Gift<span>Wallay</span></a>
        <div></div> <!-- Spacer for center alignment -->
    </nav>

    <div class="container section-pad">
        <div class="checkout-container">
            
            <!-- LEFT: FORM -->
            <form id="checkoutForm">
                <h3 style="margin-bottom: 1.5rem;">Shipping Details</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>
                <input type="text" placeholder="Street Address" required>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <select><option>Punjab</option><option>Sindh</option><option>KPK</option></select>
                    <input type="text" placeholder="City" required>
                </div>
                <input type="text" placeholder="Phone (03XX...)" required>

                <h3 style="margin: 2rem 0 1rem;">Payment Method</h3>
                
                <!-- Online Payment -->
                <label class="pay-option" onclick="selectPay(this, 'online')">
                    <div>
                        <strong>Online Payment (Card)</strong>
                        <p style="font-size: 0.8rem; color: #666;">Visa / Mastercard</p>
                    </div>
                    <input type="radio" name="payment" value="online">
                </label>

                <!-- COD Payment -->
                <label class="pay-option selected" onclick="selectPay(this, 'cod')">
                    <div>
                        <strong>Cash on Delivery</strong>
                        <p style="font-size: 0.8rem; color: #666;">Pay at doorstep</p>
                    </div>
                    <input type="radio" name="payment" value="cod" checked>
                </label>

                <!-- 50% Advance Warning -->
                <div id="codWarning" class="advance-msg" style="display: block;">
                    ⚠️ <strong>Note:</strong> Due to high value, a 50% Advance Payment is required for COD orders.
                </div>

                <button type="button" class="btn" style="width: 100%; margin-top: 2rem;" onclick="alert('Order Placed Successfully!')">Complete Order</button>
            </form>

            <!-- RIGHT: SUMMARY -->
            <div style="background: var(--gray); padding: 2rem; height: fit-content;">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="summ-thumb"></div>
                    <div>
                        <strong>Royal Watch</strong>
                        <p class="text-gold">Rs. 12,500</p>
                        <small>Qty: 1</small>
                    </div>
                </div>

                <div style="border-top: 2px solid var(--black); padding-top: 1rem; margin-top: 2rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Subtotal</span>
                        <span>Rs. 12,500</span>
                    </div>
                    
                    <!-- TAX ROW -->
                    <div id="taxRow" class="tax-row active" style="justify-content: space-between; margin-bottom: 5px;">
                        <span>Tax (9%)</span>
                        <span id="taxAmount">Rs. 1,125</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>Shipping</span>
                        <span>Rs. 250</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 1rem;">
                        <span>Total</span>
                        <span id="finalTotal" class="text-gold">Rs. 13,875</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
    <script>
        const BASE_AMOUNT = 12500 + 250; // Subtotal + Shipping
        const BASE_SUBTOTAL = 12500;

        function selectPay(element, type) {
            // Styling Highlight
            document.querySelectorAll('.pay-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            element.querySelector('input').checked = true;

            // Logic
            if(type === 'cod') {
                // Show Tax & Warning
                document.getElementById('codWarning').style.display = 'block';
                document.getElementById('taxRow').style.display = 'flex';
                
                // Calculate 9% Tax
                const tax = Math.round(BASE_SUBTOTAL * 0.09);
                document.getElementById('taxAmount').innerText = "Rs. " + tax.toLocaleString();
                document.getElementById('finalTotal').innerText = "Rs. " + (BASE_AMOUNT + tax).toLocaleString();

            } else {
                // Hide Tax & Warning
                document.getElementById('codWarning').style.display = 'none';
                document.getElementById('taxRow').style.display = 'none';
                
                // Reset Total
                document.getElementById('finalTotal').innerText = "Rs. " + BASE_AMOUNT.toLocaleString();
            }
        }
    </script>
</body>
</html>
