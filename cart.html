<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <a href="index.html" class="brand">Gift<span>Wallay</span></a>
        <a href="cart.html" class="cart-icon">🛒</a>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMenu()"></div>
    <div class="sidebar-menu" id="sidebarMenu">
         <h2 style="margin-bottom: 2rem;">Menu</h2>
         <a href="index.html" class="sidebar-link">Home</a>
         <a href="#" class="sidebar-link" onclick="toggleMenu()">✕ Close</a>
    </div>

    <div class="container section-pad">
        <h1>Shopping Cart</h1>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th colspan="2">Product</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Item 1 -->
                <tr>
                    <td style="width: 100px;">
                        <div style="width: 80px; height: 80px; background: #eee; display:flex; align-items:center; justify-content:center; font-size:0.7rem;">IMG</div>
                    </td>
                    <td>
                        <h4>Royal Emerald Watch</h4>
                        <small>Qty: 1</small>
                    </td>
                    <td>Rs. 12,500</td>
                    <td><button class="delete-btn" onclick="deleteItem(this)">Delete</button></td>
                </tr>
                <!-- Item 2 -->
                <tr>
                    <td>
                        <div style="width: 80px; height: 80px; background: #eee; display:flex; align-items:center; justify-content:center; font-size:0.7rem;">IMG</div>
                    </td>
                    <td>
                        <h4>Oud Intense</h4>
                        <small>Qty: 1</small>
                    </td>
                    <td>Rs. 4,800</td>
                    <td><button class="delete-btn" onclick="deleteItem(this)">Delete</button></td>
                </tr>
            </tbody>
        </table>

        <div style="text-align: right; margin-top: 2rem;">
            <h3>Subtotal: Rs. 17,300</h3>
            <p style="color: #666; margin-bottom: 2rem;">Shipping and taxes calculated at checkout.</p>
            <a href="checkout.html" class="btn">Proceed to Checkout</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
