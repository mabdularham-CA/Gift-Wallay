<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <a href="index.html" class="brand">Gift<span>Wallay</span></a>
        <a href="cart.html" class="cart-icon">🛒<span class="cart-count">0</span></a>
    </nav>

    <!-- SIDEBAR (Hamburger Menu) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-menu" id="sidebarMenu">
        <div style="text-align: right; font-size: 1.5rem; cursor: pointer;" onclick="toggleSidebar()">×</div>
        <div style="margin-top: 2rem;">
            <a href="index.html" class="sidebar-link">Home</a>
            <a href="shop.html" class="sidebar-link">Shop All</a>
            <a href="account.html" class="sidebar-link">My Account</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container section-pad">
        <h1 class="text-center" style="margin-bottom: 2rem;">Your Cart</h1>

        <table class="cart-table" id="cartTable">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Shimmer Loading state on first initial paint -->
                <tr id="cartLoaderRow">
                    <td colspan="5" style="text-align: center; padding: 3rem 0;">
                        <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 1rem;"></div>
                        <p style="color: #666; font-size: 0.95rem; letter-spacing: 0.5px;">Loading your premium cart...</p>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Totals & Checkout -->
        <div id="cartTotalsContainer" style="display: flex; justify-content: flex-end; margin-top: 3rem; opacity: 0.3; pointer-events: none;">
            <div style="width: 100%; max-width: 400px; background: var(--gray); padding: 2rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: bold;">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">Rs. 0</span>
                </div>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 2rem;">Shipping & taxes calculated at checkout.</p>
                <a href="checkout.html" class="btn" style="display: block; text-align: center; width: 100%;">Proceed to Checkout</a>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
