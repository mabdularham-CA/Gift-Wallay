<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart | Gift Wallay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="brand">Gift<span class="text-gold">Wallay</span></a>
        <div class="nav-links">
            <a href="index.html">Continue Shopping</a>
            <a href="account.html">My Account</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>Your Shopping Cart</h1>
    </div>

    <div class="container" style="min-height: 60vh;">
        <table class="cart-table">
            <thead>
                <tr>
                    <th colspan="2">Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <!-- Item 1 -->
                <tr>
                    <td style="width: 100px;">
                        <div class="cart-thumb">WATCH IMG</div>
                    </td>
                    <td>
                        <h4>Royal Emerald Watch</h4>
                        <small style="color: #666;">Ref: 00142</small>
                    </td>
                    <td>Rs. 12,500</td>
                    <td><input type="number" value="1" style="width: 60px;"></td>
                    <td style="font-weight: bold;">Rs. 12,500</td>
                </tr>
                <!-- Item 2 -->
                <tr>
                    <td style="width: 100px;">
                        <div class="cart-thumb" style="background: #333; color:gold;">OUD IMG</div>
                    </td>
                    <td>
                        <h4>Oud Intense</h4>
                        <small style="color: #666;">100ml</small>
                    </td>
                    <td>Rs. 4,800</td>
                    <td><input type="number" value="1" style="width: 60px;"></td>
                    <td style="font-weight: bold;">Rs. 4,800</td>
                </tr>
            </tbody>
        </table>

        <div style="display: flex; justify-content: flex-end; margin-top: 2rem;">
            <div style="width: 300px; background: var(--gray); padding: 2rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <span>Subtotal</span>
                    <span>Rs. 17,300</span>
                </div>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 2rem;">Shipping calculated at next step.</p>
                <a href="checkout.html" class="btn" style="width: 100%; text-align: center; background: var(--black); color: var(--gold);">Proceed to Checkout</a>
            </div>
        </div>
    </div>

</body>
</html>
